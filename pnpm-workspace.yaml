# Restreint les paquets autorisés à exécuter des scripts de build post-install.
# Migré depuis package.json#pnpm.onlyBuiltDependencies (supprimé en pnpm v10).
onlyBuiltDependencies:
  - "@nestjs/core"
  - bcrypt
  - better-sqlite3
  - unrs-resolver

# Épingler les dépendances transitives trop récentes pour passer la supply-chain policy.
overrides:
  enhanced-resolve: "5.21.5"
  node-releases: "2.0.44"
